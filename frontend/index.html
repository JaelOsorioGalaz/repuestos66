<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de Repuestos - Webpay</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="navbar">
        <div class="logo-container" onclick="irHome()" style="cursor: pointer;">
            <img src="img/logo.jpg" alt="RepuestosPro Logo" id="logo-tienda">
            <h2>Ruta66</h2>
        </div>
        <input type="text" id="buscador" placeholder="Buscar repuestos..." onkeyup="filtrarProductos()">
    </header>

    <div class="layout">

        <aside class="categorias">
            <h3>Categorías</h3>
            <ul>
                <li onclick="filtrarCategoria('todos')">Todos</li>
                <li onclick="filtrarCategoria('Filtros y aceites')">Filtros y aceites</li>
                <li onclick="filtrarCategoria('Bujías')">Bujías</li>
                <li onclick="filtrarCategoria('Kit')">Kits</li>
            </ul>
        </aside>

        <main>
            <div id="productos"></div>
        </main>

        <div class="carrito-box">
            <h2>Carrito</h2>
            <div id="carrito"></div>
            <p class="total-texto">Total: $<span id="total">0</span></p>
            <div class="acciones-carrito">
                <button class="btn-vaciar" onclick="vaciarCarrito()">Vaciar carrito</button>
                <button id="btn-pagar" onclick="pagarConWebpay()">
                    Pagar con Webpay
                </button>
            </div>
        </div>

    </div>

    <script src="carrito.js"></script>
</body>
</html>
